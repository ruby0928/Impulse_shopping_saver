<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>想想你要買哪個 🤔</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-100 p-4 md:p-8 min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden p-8 border border-slate-200">
        <h2 class="text-2xl font-black text-slate-800 mb-6 text-center italic">想想你要買哪個 🤔</h2>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">你現在想買什麼？</label>
                <input type="text" id="itemName" placeholder="例如：蘿蔔絲餅"
                    class="w-full border-slate-300 rounded-xl shadow-sm border p-3 focus:ring-2 focus:ring-blue-400 outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">金額 (TWD)</label>
                <input type="number" id="amount" placeholder="輸入預計花費"
                    class="w-full border-slate-300 rounded-xl shadow-sm border p-3 focus:ring-2 focus:ring-blue-400 outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">換算股票標的</label>
                <select id="stockSymbol" class="w-full border-slate-300 rounded-xl shadow-sm border p-3 bg-white">
                    <option value="2330">2330 台積電 (TSMC)</option>
                    <option value="0050">0050 元大台灣50</option>
                </select>
            </div>

            <button onclick="calculate()" id="btnText"
                class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 active:scale-95 transition duration-300 shadow-lg">
                換算股數
            </button>
        </div>

        <div id="result" class="mt-8 p-6 bg-blue-50 rounded-2xl border border-blue-100 hidden animate-fade-in">
            <p class="text-slate-600 text-sm">若將購買 <span id="resItem" class="font-bold text-blue-700"></span> 的預算...</p>
            <p class="text-slate-600 text-sm">投入到 <span id="resStock" class="font-bold text-slate-800"></span></p>

            <div class="my-4">
                <span class="text-5xl font-black text-blue-600" id="resShares">0</span>
                <span class="text-lg font-bold text-slate-900 ml-1">股</span>
            </div>

            <div class="mt-4 pt-4 border-t border-blue-200">
                <p class="text-slate-600 text-sm italic">
                    這筆錢若投入市場，5年後預估增值為：
                </p>
                <div class="mt-1">
                    <span class="text-2xl font-bold text-emerald-600 font-mono">NT$ </span>
                    <span id="resFutureValue" class="text-3xl font-black text-emerald-600">0</span>
                </div>
                <p class="text-[10px] text-slate-400 mt-1">* 依年化報酬率 5% 複利計算</p>
            </div>

            <p class="text-[10px] text-slate-400 italic font-mono leading-tight mt-4">
                * 參考收盤價：<span id="displayPrice" class="font-bold underline text-slate-500">--</span> (TWD)<br>
                * 數據更新日期：<span id="dataDate" class="font-bold text-slate-500">--</span>
            </p>
        </div>
    </div>

    <script>
        const FINMIND_TOKEN = "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJkYXRlIjoiMjAyNi0wNC0xNyAyMDozNDo0MCIsInVzZXJfaWQiOiJpZXduYXVzaCIsImlwIjoiMS4xNjIuMTU2LjY1IiwiZXhwIjoxNzc3MDM0MDgwfQ.b0YUw6GXNtTcG44M9F-QF9-KOreVImtAPSoxSyR_Mbc";

        async function calculate() {
            const item = document.getElementById('itemName').value || "該項目";
            const amount = parseFloat(document.getElementById('amount').value);
            const stockSymbol = document.getElementById('stockSymbol').value;
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('btnText');

            if (!amount || amount <= 0) {
                alert('請輸入有效金額！');
                return;
            }

            // --- 💡 LocalStorage 持久化快取邏輯 ---
            let finalPrice;
            let finalDate;

            // 從瀏覽器「隨身碟」拿資料
            const cachedData = JSON.parse(localStorage.getItem(`price_${stockSymbol}`));
            const now = new Date();

            // 判斷條件：有資料 且 距離上次抓取小於 1 小時 (3600000 毫秒)
            if (cachedData && (now - new Date(cachedData.timestamp) < 3600000)) {
                console.log(`從 LocalStorage 讀取 ${stockSymbol}，省下一次 API！`);
                finalPrice = cachedData.price;
                finalDate = cachedData.date;
            } else {
                console.log(`${stockSymbol} 無快取或已過期，準備發送 API...`);
                btn.innerText = "讀取中...";
                btn.disabled = true;

                try {
                    // ... (這部分維持原本的日期判斷邏輯) ...
                    let targetDate = new Date();
                    if (now.getDay() === 0 || now.getDay() === 6 || now.getHours() < 14) {
                        let offset = (now.getDay() === 1) ? 3 : (now.getDay() === 0) ? 2 : (now.getDay() === 6) ? 1 : 1;
                        targetDate.setDate(now.getDate() - offset);
                    }
                    const dateString = targetDate.toISOString().split('T')[0];

                    const url = `https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${stockSymbol}&start_date=${dateString}&token=${FINMIND_TOKEN}`;
                    const response = await fetch(url);
                    const json = await response.json();

                    if (json.data && json.data.length > 0) {
                        const lastEntry = json.data[json.data.length - 1];
                        finalPrice = lastEntry.close;
                        finalDate = lastEntry.date;

                        // 💡 存入 LocalStorage，並加上當下的時間戳記
                        const dataToCache = {
                            price: finalPrice,
                            date: finalDate,
                            timestamp: new Date().toISOString()
                        };
                        localStorage.setItem(`price_${stockSymbol}`, JSON.stringify(dataToCache));
                    } else {
                        finalPrice = (stockSymbol === "2330") ? 2080 : 184.15;
                        finalDate = dateString + " (預估)";
                    }
                } catch (error) {
                    console.error(error);
                    finalPrice = (stockSymbol === "2330") ? 2080 : 184.15;
                    finalDate = "連線失敗";
                } finally {
                    btn.innerText = "換算股數";
                    btn.disabled = false;
                }
            }
            // --- 💡 快取邏輯結束 ---

            // (剩下的計算與渲染邏輯維持不變...)
            const shares = (amount / finalPrice).toFixed(4);
            const futureValue = Math.round(amount * Math.pow(1.07, 5));
            document.getElementById('resItem').innerText = item;
            document.getElementById('resStock').innerText = stockSymbol === "2330" ? "2330 台積電" : "0050 元大台灣50";
            document.getElementById('resShares').innerText = shares;
            document.getElementById('displayPrice').innerText = finalPrice;
            document.getElementById('dataDate').innerText = finalDate;
            document.getElementById('resFutureValue').innerText = futureValue.toLocaleString();
            resultDiv.classList.remove('hidden');
        }
    </script>
</body>

</html>
